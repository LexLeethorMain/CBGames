<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromebook Games</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./style.css">
  <style>
    .clock {
      position: fixed;
      top: 0.5vw;
      left: 0.5vw;
      color: white;
      font-size: 2vw;
      letter-spacing: 0.3vw;
      font-family: 'Clock', sans-serif;
      background-color: #111;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 8px 8px 16px 111, -8px -8px 16px #4d4d4d;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #333;
      overflow: hidden;
    }

    .container {
      position: fixed;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .row {
      display: flex;
      flex-wrap: nowrap;
    }

    .square-button {
      border: none;
      cursor: pointer;
      width: 10vw;
      height: 10vw;
      border-radius: 20px;
      margin: 0.5vw;
      transition: all 0.7s ease;
      opacity: 0;
      transform: translateX(-50px);
      position: relative;
      overflow: hidden;
    }

    .square-button.loaded {
      opacity: 1;
      transform: translateX(0);
    }

    .square-button:hover {
      box-shadow: 0 0 20px 5px rgba(100, 100, 200, 0.5);
    }

    .square-button:hover {
      transform: scale(1.1) rotate(360deg);
    }

    /* Add animation delay for each button */
    .square-button:nth-child(1) { animation-delay: 0.1s; }
    .square-button:nth-child(2) { animation-delay: 0.2s; }


  </style>
</head>

<body>
  <div id="MyClockDisplay" class="clock">07:14:33 PM</div>

<div class="container">
  <div class="row">
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/n-gon.png', 'N-gon/index.html');" style="background-image: url('Imgs/n-gon.png'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/csgo.jpg', 'CSGO Clicker/CaseClicker.html');" style="background-image: url('Imgs/csgo.jpg'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/pico.jpg', 'Pico8/Pico Hub.html');" style="background-image: url('Imgs/pico.jpg'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/Candy.png', 'Candy Box/Index.html');" style="background-image: url('Imgs/Candy.png'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/minecraft.jpeg', 'SFGames/Eaglercraft 1.8.8.html');" style="background-image: url('Imgs/minecraft.jpeg'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/dash.jpeg', 'SFGames/Geometry Dash.html');" style="background-image: url('Imgs/dash.jpeg'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/cookie.jpg', 'Cookie Clicker/index.html');" style="background-image: url('Imgs/cookie.jpg'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/SB.webp', 'SandBoxels/index.html');" style="background-image: url('Imgs/SB.webp'); background-size: cover;"></button>
  </div>
  <div class="row">
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/Undertale.jpeg', 'SFGames/Sans Boss Fight.html');" style="background-image: url('Imgs/Undertale.jpeg'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/dafunnygam.png', 'Yves Games/dafunnygam.html');" style="background-image: url('Imgs/dafunnygam.png'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/dfg2.png', 'Yves Games/dfg2.html');" style="background-image: url('Imgs/dfg2.png'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/Chess.jpg', 'Chess/index.html');" style="background-image: url('Imgs/Chess.jpg'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/Wordle.png', 'Wordle/index.html');" style="background-image: url('Imgs/Wordle.png'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/i2t.png', 'Otherstuff/I2T.html');" style="background-image: url('Imgs/i2t.png'); background-size: cover;"></button>
    <button class="square-button loaded" onclick="showLoading(this, 'Imgs/html.png', 'Otherstuff/Html Runner.html');" style="background-image: url('Imgs/html.png'); background-size: cover;"></button>

  </div>
</div>


  <script>
    function showTime() {
      let date = new Date();
      let h = date.getHours();
      let m = date.getMinutes();
      let s = date.getSeconds();
      let session = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      h = h < 10 ? "0" + h : h;
      m = m < 10 ? "0" + m : m;
      s = s < 10 ? "0" + s : s;
      let time = h + ":" + m + ":" + s + " " + session;
      document.getElementById("MyClockDisplay").innerText = time;
      document.getElementById("MyClockDisplay").textContent = time;
      setTimeout(showTime, 1000);
    }
    showTime();

    // Function to add loaded class to buttons after page load
    window.addEventListener('load', function() {
      var buttons = document.querySelectorAll('.square-button');
      buttons.forEach(function(button) {
        button.classList.add('loaded');
      });
    });

    // Function to show loading animation
    function showLoading(button, imageUrl, gameUrl) {
      var circle = document.createElement("div");
      circle.classList.add("expand-circle");
      button.appendChild(circle);

      // Redirect to game URL immediately after the circle animation finishes
      setTimeout(function() {
        window.location.href = gameUrl;
      }, 0); // Adjust the delay if needed
    }
  </script>
